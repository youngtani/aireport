<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>수업 리포트</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <h1 class="title">수업 리포트</h1>
        <button id="btnReset" class="btn btn-ghost" type="button">초기화</button>
      </header>

      <!-- Global memo -->
      <section class="card">
        <div class="card-title">전체 메모</div>
        <div class="field">
          <textarea id="globalMemo" class="control textarea-compact" placeholder="모든 학생에게 공통으로 적용할 메모 (예: 오늘 수업 방식, 공통 활동 등)"></textarea>
          <div class="hint">여기에 적은 내용은 모든 학생의 코멘트 생성 시 참고됩니다.</div>
        </div>
      </section>

      <!-- 1. Student name -->
      <section class="card">
        <div class="card-title">학생 이름</div>
        <div class="field">
          <div class="row">
            <input id="studentName" class="control" type="text" placeholder="예: 이수" />
            <button id="btnSaveStudent" class="btn btn-secondary" type="button">저장</button>
          </div>
          <div class="student-chips" id="studentChips"></div>
        </div>
      </section>

      <!-- 2. Book title -->
      <section class="card">
        <div class="card-title">책 제목</div>
        <div class="field">
          <input id="bookTitle" class="control" type="text" placeholder="예: Norma Jean, Jumping Bean" />
        </div>
        <div class="field">
          <label class="label" for="pagesOrChapter">범위 (선택)</label>
          <input id="pagesOrChapter" class="control" type="text" placeholder="예: Chapter 6-9 / p.25-40" />
        </div>
      </section>

      <!-- 3. Voice recording & transcription -->
      <section class="card">
        <div class="card-title">녹음 & 텍스트 변환</div>
        <div class="record-section">
          <div class="record-row">
            <button id="btnRecord" class="btn btn-record" type="button">녹음 시작</button>
            <span id="recordStatus" class="record-status"></span>
          </div>
          <div class="field">
            <label class="label" for="transcription">변환된 텍스트 / 수업 대화 내용</label>
            <textarea id="transcription" class="control textarea transcription-box" placeholder="녹음 후 변환된 텍스트가 여기에 표시됩니다. 직접 입력하거나 붙여넣기도 가능합니다."></textarea>
          </div>
        </div>
      </section>

      <!-- 4. Student memo -->
      <section class="card">
        <div class="card-title">학생 메모</div>
        <div class="field">
          <textarea id="studentMemo" class="control textarea-compact" placeholder="이 학생에 대한 메모 (예: 레벨, 성향, 주의사항 등). 학생별로 자동 저장됩니다."></textarea>
          <div class="hint">학생 이름 클릭 시 해당 학생의 메모가 자동으로 불러와집니다.</div>
        </div>
      </section>

      <!-- 5. Additional notes -->
      <section class="card">
        <div class="card-title">추가 메모 (선택)</div>
        <div class="field">
          <textarea id="tutorNotes" class="control textarea-compact" placeholder="예: 에세이 주제는 ~~, 단어 시험 7/10 등"></textarea>
        </div>
      </section>

      <!-- 6. Past student comments -->
      <section class="card">
        <div class="card-title">이 학생의 과거 코멘트</div>
        <div class="hint" style="margin-top:0; margin-bottom:8px">AI가 과거 코멘트를 참고하여 더 일관된 코멘트를 생성합니다.</div>
        <div id="studentPastComments" class="history">
          <div class="hint">학생을 선택하면 과거 코멘트가 표시됩니다.</div>
        </div>
      </section>

      <!-- 7. Generate -->
      <section class="card">
        <div class="actions" style="margin-top:0">
          <button id="btnGenerate" class="btn btn-primary" type="button">코멘트 생성</button>
          <button id="btnCopy" class="btn btn-secondary" type="button" disabled>복사</button>
        </div>
        <div id="status" class="status" aria-live="polite"></div>

        <div class="field" style="margin-top:14px">
          <label class="label" for="output">결과</label>
          <textarea id="output" class="control textarea output" placeholder="여기에 학부모 코멘트가 생성됩니다"></textarea>
        </div>

        <!-- Chat edit -->
        <div id="editChatSection" hidden>
          <div class="divider"></div>
          <div class="card-title small">AI로 결과 수정</div>
          <div class="chat">
            <div id="editChatMessages" class="chat-messages" aria-live="polite"></div>
            <div class="chat-actions">
              <textarea id="editChatInput" class="control textarea-chat" placeholder="예: 마지막 문장을 더 따뜻하게 바꿔줘"></textarea>
              <div class="row chat-buttons">
                <button id="btnEditSend" class="btn btn-primary" type="button">AI 수정</button>
                <button id="btnEditUndo" class="btn btn-secondary" type="button" disabled>되돌리기</button>
                <button id="btnEditClear" class="btn btn-ghost" type="button">대화 지우기</button>
              </div>
            </div>
          </div>
        </div>

        <div class="divider"></div>
        <details id="historyDetails" class="details">
          <summary class="details-summary">
            <span class="card-title small" style="margin:0">최근 생성 기록</span>
            <span class="details-hint">클릭해서 열기</span>
          </summary>
          <div class="row row-between" style="margin-top:8px">
            <div class="hint" style="margin:0">최근 20개까지 저장됩니다.</div>
            <button id="btnClearHistory" class="btn btn-ghost" type="button">기록 삭제</button>
          </div>
          <div id="history" class="history"></div>
        </details>
      </section>
    </div>

    <script src="/app.js" defer></script>
  </body>
</html>
