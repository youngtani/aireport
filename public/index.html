<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>수업 리포트</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>

    <!-- ===== Login screen ===== -->
    <div id="loginScreen" class="login-screen">
      <div class="login-card">
        <div class="login-brand">
          <div class="brand-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          </div>
          <div class="login-title">수업 리포트</div>
        </div>

        <!-- Tabs -->
        <div class="login-tabs">
          <button class="login-tab active" data-tab="login" type="button">로그인</button>
          <button class="login-tab" data-tab="register" type="button">회원가입</button>
        </div>

        <!-- Login form -->
        <div id="loginForm" class="login-form-section">
          <div class="login-field">
            <label class="memo-label">이름</label>
            <input id="loginName" class="input" type="text" placeholder="선생님 이름" autocomplete="username" />
          </div>
          <div class="login-field">
            <label class="memo-label">비밀번호</label>
            <input id="loginPass" class="input" type="password" placeholder="비밀번호" autocomplete="current-password" />
          </div>
          <button id="btnLogin" class="generate-btn" type="button">로그인</button>
          <div id="loginError" class="status bad" style="margin-top:8px"></div>
        </div>

        <!-- Register form -->
        <div id="registerForm" class="login-form-section" hidden>
          <div class="login-field">
            <label class="memo-label">이름</label>
            <input id="regName" class="input" type="text" placeholder="선생님 이름" autocomplete="off" />
          </div>
          <div class="login-field">
            <label class="memo-label">비밀번호</label>
            <input id="regPass" class="input" type="password" placeholder="비밀번호" autocomplete="new-password" />
          </div>
          <div class="login-field">
            <label class="memo-label">비밀번호 확인</label>
            <input id="regPassConfirm" class="input" type="password" placeholder="비밀번호 다시 입력" autocomplete="new-password" />
          </div>
          <button id="btnRegister" class="generate-btn" type="button">가입 신청</button>
          <div id="regError" class="status bad" style="margin-top:8px"></div>
          <div id="regSuccess" class="status good" style="margin-top:8px"></div>
        </div>
      </div>
    </div>

    <!-- ===== Main app (hidden until logged in) ===== -->
    <div id="mainApp" class="app" hidden>

      <!-- Top bar -->
      <header class="topbar">
        <div class="topbar-brand">
          <div class="brand-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          </div>
          <span class="brand-text">수업 리포트</span>
          <span id="tutorBadge" class="tutor-badge"></span>
        </div>
        <div class="topbar-actions">
          <button id="btnReset" class="topbar-btn" type="button">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
            초기화
          </button>
          <button id="btnLogout" class="topbar-btn" type="button">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            로그아웃
          </button>
        </div>
      </header>

      <!-- Main layout -->
      <div class="layout">

        <!-- LEFT -->
        <div class="col-input">

          <!-- Recording (first — start recording as soon as student walks in) -->
          <div class="panel">
            <div class="panel-header">
              <svg class="panel-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
              <span class="panel-title">수업 녹음</span>
            </div>
            <div class="record-bar">
              <button id="btnRecord" class="record-btn" type="button">
                <span class="record-dot"></span>
                <span class="record-label">녹음</span>
              </button>
              <span id="recordTimer" class="record-timer"></span>
              <span id="recordStatus" class="record-status-text"></span>
            </div>
            <textarea id="transcription" class="input textarea" placeholder="녹음 후 자동 변환되거나, 직접 붙여넣기"></textarea>
          </div>

          <!-- Student -->
          <div class="panel">
            <div class="panel-header">
              <svg class="panel-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <span class="panel-title">학생</span>
            </div>
            <div class="input-row">
              <input id="studentName" class="input" type="text" placeholder="학생 이름" />
              <button id="btnSaveStudent" class="icon-btn" type="button" title="학생 저장">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              </button>
            </div>
            <div class="chips" id="studentChips"></div>
          </div>

          <!-- Book -->
          <div class="panel">
            <div class="panel-header">
              <svg class="panel-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
              <span class="panel-title">책 정보</span>
            </div>
            <input id="bookTitle" class="input" type="text" placeholder="책 제목" />
            <input id="pagesOrChapter" class="input input-sm" type="text" placeholder="범위 (선택) — Ch.6-9" />
          </div>

          <!-- Memos -->
          <div class="panel">
            <div class="panel-header">
              <svg class="panel-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
              <span class="panel-title">메모</span>
            </div>
            <div class="memo-group">
              <label class="memo-label">내 메모 <span class="memo-badge">개인</span></label>
              <textarea id="globalMemo" class="input textarea-sm" placeholder="나만의 메모 (다른 선생님과 공유되지 않음)"></textarea>
            </div>
            <div class="memo-group">
              <label class="memo-label">학생 메모 <span class="memo-badge student">공유</span></label>
              <textarea id="studentMemo" class="input textarea-sm" placeholder="이 학생의 레벨, 성향 등 (모든 선생님이 공유)"></textarea>
            </div>
            <div class="memo-group">
              <label class="memo-label">추가 메모</label>
              <textarea id="tutorNotes" class="input textarea-sm" placeholder="오늘 수업 특이사항, 단어시험 점수 등"></textarea>
            </div>
          </div>

          <!-- Generate -->
          <button id="btnGenerate" class="generate-btn" type="button">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            코멘트 생성
          </button>
          <div id="status" class="status" aria-live="polite"></div>
        </div>

        <!-- RIGHT -->
        <div class="col-output">

          <!-- Result -->
          <div class="panel panel-result">
            <div class="panel-header">
              <svg class="panel-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              <span class="panel-title">결과</span>
              <div style="margin-left:auto; display:flex; gap:6px;">
                <button id="btnCopy" class="copy-btn" type="button" disabled>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                  복사
                </button>
                <button id="btnFinalSave" class="final-save-btn" type="button" disabled>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                  최종저장
                </button>
              </div>
            </div>
            <textarea id="output" class="input textarea textarea-output" placeholder="생성된 학부모 코멘트가 여기에 표시됩니다"></textarea>

            <!-- Inline edit -->
            <div id="editChatSection" class="edit-section" hidden>
              <div class="edit-header">AI 수정</div>
              <div id="editChatMessages" class="edit-messages" aria-live="polite"></div>
              <div class="edit-input-row">
                <textarea id="editChatInput" class="input textarea-sm" placeholder="예: 마지막 문장을 더 따뜻하게"></textarea>
                <div class="edit-actions">
                  <button id="btnEditSend" class="btn-sm btn-sm-primary" type="button">수정</button>
                  <button id="btnEditUndo" class="btn-sm" type="button" disabled>되돌리기</button>
                  <button id="btnEditClear" class="btn-sm btn-sm-ghost" type="button">초기화</button>
                </div>
              </div>
            </div>
          </div>

          <!-- Past student comments (shared) -->
          <details class="panel panel-collapsible" id="pastCommentsDetails">
            <summary class="collapsible-header">
              <div class="panel-header" style="margin:0">
                <svg class="panel-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                <span class="panel-title">이 학생의 저장된 코멘트 <span class="memo-badge student">공유</span></span>
              </div>
              <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
            </summary>
            <div id="studentPastComments" class="past-list">
              <p class="empty-state">학생을 선택하면 저장된 코멘트가 표시됩니다.</p>
            </div>
          </details>

          <!-- All history (shared) -->
          <details class="panel panel-collapsible" id="historyDetails">
            <summary class="collapsible-header">
              <div class="panel-header" style="margin:0">
                <svg class="panel-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                <span class="panel-title">전체 저장 기록 <span class="memo-badge student">공유</span></span>
              </div>
              <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
            </summary>
            <div id="history" class="past-list"></div>
          </details>

        </div>
      </div>
    </div>

    <script src="/app.js" defer></script>
  </body>
</html>
